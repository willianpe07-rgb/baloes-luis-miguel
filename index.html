<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Balões do Luís Miguel 🎈🐾</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    overflow: hidden;
    height: 100vh;
    position: relative;
    text-align: center;
    transition: background 1s ease;
    background: linear-gradient(to top, #74ebd5, #9face6, #ffffff);
}

/* topo */
.topo {
    padding-top: 20px;
    position: relative;
    z-index: 10;
}

h1 {
    font-size: 42px;
    color: white;
    text-shadow: 2px 2px 8px rgba(0,0,0,0.25);
    margin-bottom: 10px;
}

#score {
    font-size: 30px;
    color: white;
    font-weight: bold;
    margin-bottom: 10px;
    text-shadow: 1px 1px 5px rgba(0,0,0,0.25);
}

.message {
    font-size: 22px;
    color: white;
    font-weight: bold;
    text-shadow: 1px 1px 4px rgba(0,0,0,0.25);
    margin-bottom: 20px;
}

/* balões normais */
.balloon {
    width: 80px;
    height: 100px;
    border-radius: 50%;
    position: absolute;
    bottom: -150px;
    cursor: pointer;
    box-shadow:
        inset -10px -10px 18px rgba(0,0,0,0.12),
        0 10px 18px rgba(0,0,0,0.18);
    transition: transform 0.2s;
}

.balloon::before {
    content: "";
    position: absolute;
    width: 18px;
    height: 18px;
    background: inherit;
    bottom: -8px;
    left: 31px;
    transform: rotate(45deg);
}

.balloon::after {
    content: "";
    position: absolute;
    width: 2px;
    height: 45px;
    background: #666;
    left: 50%;
    bottom: -50px;
}

/* balão dourado */
.special {
    width: 130px;
    height: 160px;
    background: gold !important;
    box-shadow:
        inset -12px -12px 22px rgba(255,255,255,0.4),
        0 0 25px rgba(255,215,0,0.9);
    animation: pulse 1s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.08); }
    100% { transform: scale(1); }
}

/* coração */
.love-message {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.2);
    font-size: 34px;
    font-weight: bold;
    color: red;
    opacity: 0;
    z-index: 999;
    animation: lovePop 2.5s ease forwards;
}

@keyframes lovePop {
    0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.2);
    }
    40% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1.5);
    }
    70% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1.8);
    }
    100% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(2.2);
    }
}

/* animal educativo */
.animal-popup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.2);
    z-index: 999;
    text-align: center;
    opacity: 0;
    animation: animalShow 3s ease forwards;
}

.animal-emoji {
    font-size: 100px;
}

.animal-name {
    font-size: 38px;
    font-weight: bold;
    color: white;
    margin-top: 10px;
}

@keyframes animalShow {
    0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.2);
    }
    30% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1.1);
    }
    70% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1.2);
    }
    100% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(1.5);
    }
}

/* pássaros */
.bird {
    position: absolute;
    font-size: 40px;
    left: -100px;
    animation: flyBird 6s linear forwards;
    z-index: 5;
}

@keyframes flyBird {
    0% { left: -100px; }
    100% { left: 110%; }
}

/* jacaré */
.crocodile {
    position: absolute;
    bottom: 20px;
    left: -150px;
    font-size: 80px;
    animation: walkCroc 6s linear forwards;
    z-index: 6;
}

@keyframes walkCroc {
    0% { left: -150px; }
    100% { left: 110%; }
}
</style>
</head>
<body>

<div class="topo">
    <h1>🎈 Balões do Luís Miguel 🎈</h1>
    <div id="score">Pontos: 0</div>
    <div class="message">Estoure os balões e descubra os animais! 🐾</div>
</div>

<script>
let score = 0;
let totalPopped = 0;
let specialActive = false;

const colors = [
    "#ff4d6d",
    "#ffbe0b",
    "#3a86ff",
    "#06d6a0",
    "#8338ec",
    "#fb5607",
    "#ff66c4",
    "#00c2ff"
];

const animals = [
    { emoji: "🐵", name: "MACACO" },
    { emoji: "🐊", name: "JACARÉ" },
    { emoji: "🐶", name: "CACHORRO" },
    { emoji: "🦁", name: "LEÃO" },
    { emoji: "🐘", name: "ELEFANTE" }
];

const backgrounds = [
    "linear-gradient(to top, #74ebd5, #9face6, #ffffff)",
    "linear-gradient(to top, #ff9a9e, #fad0c4, #ffffff)",
    "linear-gradient(to top, #a18cd1, #fbc2eb, #ffffff)",
    "linear-gradient(to top, #f6d365, #fda085, #ffffff)"
];

function showAnimal() {
    const animal = animals[Math.floor(Math.random() * animals.length)];

    const popup = document.createElement("div");
    popup.classList.add("animal-popup");
    popup.innerHTML = `
        <div class="animal-emoji">${animal.emoji}</div>
        <div class="animal-name">${animal.name}</div>
    `;

    document.body.appendChild(popup);

    setTimeout(() => popup.remove(), 3000);
}

function showLoveMessage() {
    const love = document.createElement("div");
    love.classList.add("love-message");
    love.innerHTML = "❤️ TE AMO ❤️";

    document.body.appendChild(love);

    setTimeout(() => love.remove(), 2500);
}

function showBirds() {
    for (let i = 0; i < 3; i++) {
        const bird = document.createElement("div");
        bird.classList.add("bird");
        bird.innerHTML = "🕊️";
        bird.style.top = (80 + Math.random() * 150) + "px";
        bird.style.animationDelay = (i * 0.5) + "s";

        document.body.appendChild(bird);

        setTimeout(() => bird.remove(), 7000);
    }
}

function showCrocodile() {
    const croc = document.createElement("div");
    croc.classList.add("crocodile");
    croc.innerHTML = "🐊";

    document.body.appendChild(croc);

    setTimeout(() => croc.remove(), 6000);
}

function changeScenario() {
    const bg = backgrounds[Math.floor(Math.random() * backgrounds.length)];
    document.body.style.background = bg;
}

function createBalloon(isSpecial = false) {
    const balloon = document.createElement("div");
    balloon.classList.add("balloon");

    if (isSpecial) {
        balloon.classList.add("special");
    } else {
        balloon.style.background =
            colors[Math.floor(Math.random() * colors.length)];
    }

    balloon.style.left =
        Math.random() * (window.innerWidth - 150) + "px";

    document.body.appendChild(balloon);

    let position = -180;
    const speed = isSpecial ? 2 : Math.random() * 2 + 2.5;

    const move = setInterval(() => {
        position += speed;
        balloon.style.bottom = position + "px";

        if (position > window.innerHeight) {
            clearInterval(move);
            balloon.remove();

            if (isSpecial) {
                specialActive = false;
            }
        }
    }, 20);

    balloon.addEventListener("click", () => {
        clearInterval(move);
        balloon.remove();

        if (isSpecial) {
            showLoveMessage();
            specialActive = false;
            return;
        }

        score++;
        totalPopped++;

        document.getElementById("score").innerText =
            "Pontos: " + score;

        if (totalPopped % 5 === 0) {
            showAnimal();
        }

        if (totalPopped % 10 === 0 && !specialActive) {
            specialActive = true;
            createBalloon(true);
        }

        if (totalPopped % 20 === 0) {
            changeScenario();
            showBirds();
        }

        if (totalPopped % 30 === 0) {
            showCrocodile();
        }
    });
}

setInterval(() => {
    if (!specialActive) {
        createBalloon();
    }
}, 800);
</script>

</body>
</html>
