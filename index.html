<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Balões do Luís Miguel 🎈🐾</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    overflow: hidden;
    height: 100vh;
    position: relative;
    text-align: center;
    transition: background 1s ease;
    background: linear-gradient(to top, #74ebd5, #9face6, #ffffff);
}

/* topo */
.topo {
    padding-top: 20px;
    position: relative;
    z-index: 10;
}

h1 {
    font-size: 42px;
    color: white;
    text-shadow: 2px 2px 8px rgba(0,0,0,0.25);
    margin-bottom: 10px;
}

#score {
    font-size: 30px;
    color: white;
    font-weight: bold;
    margin-bottom: 10px;
    text-shadow: 1px 1px 5px rgba(0,0,0,0.25);
}

.message {
    font-size: 22px;
    color: white;
    font-weight: bold;
    text-shadow: 1px 1px 4px rgba(0,0,0,0.25);
    margin-bottom: 20px;
}

/* balões */
.balloon {
    width: 80px;
    height: 100px;
    border-radius: 50%;
    position: absolute;
    bottom: -150px;
    cursor: pointer;
    box-shadow:
        inset -10px -10px 18px rgba(0,0,0,0.12),
        0 10px 18px rgba(0,0,0,0.18);
    transition: transform 0.2s;
}

.balloon::before {
    content: "";
    position: absolute;
    width: 18px;
    height: 18px;
    background: inherit;
    bottom: -8px;
    left: 31px;
    transform: rotate(45deg);
}

.balloon::after {
    content: "";
    position: absolute;
    width: 2px;
    height: 45px;
    background: #666;
    left: 50%;
    bottom: -50px;
}

/* animal educativo */
.animal-popup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.2);
    z-index: 999;
    text-align: center;
    opacity: 0;
    animation: animalShow 3s ease forwards;
}

.animal-emoji {
    font-size: 100px;
}

.animal-name {
    font-size: 38px;
    font-weight: bold;
    color: white;
    text-shadow: 2px 2px 8px rgba(0,0,0,0.3);
    margin-top: 10px;
}

@keyframes animalShow {
    0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.2);
    }
    30% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1.1);
    }
    70% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1.2);
    }
    100% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(1.5);
    }
}

/* decoração */
.decor {
    position: absolute;
    font-size: 45px;
    opacity: 0.6;
}

.d1 { top: 30px; left: 30px; }
.d2 { top: 60px; right: 40px; }
.d3 { bottom: 80px; left: 50px; }
.d4 { bottom: 100px; right: 60px; }

</style>
</head>
<body>

<div class="decor d1">☁️</div>
<div class="decor d2">⭐</div>
<div class="decor d3">🌈</div>
<div class="decor d4">☀️</div>

<div class="topo">
    <h1>🎈 Balões do Luís Miguel 🎈</h1>
    <div id="score">Pontos: 0</div>
    <div class="message">Estoure os balões e descubra os animais! 🐾</div>
</div>

<script>
let score = 0;
let totalPopped = 0;

const colors = [
    "#ff4d6d",
    "#ffbe0b",
    "#3a86ff",
    "#06d6a0",
    "#8338ec",
    "#fb5607",
    "#ff66c4",
    "#00c2ff"
];

const animals = [
    { emoji: "🐵", name: "MACACO" },
    { emoji: "🐊", name: "JACARÉ" },
    { emoji: "🐶", name: "CACHORRO" },
    { emoji: "🦁", name: "LEÃO" },
    { emoji: "🐘", name: "ELEFANTE" },
    { emoji: "🦒", name: "GIRAFA" },
    { emoji: "🐸", name: "SAPO" },
    { emoji: "🐰", name: "COELHO" },
    { emoji: "🐼", name: "PANDA" },
    { emoji: "🐷", name: "PORQUINHO" }
];

function showAnimal() {
    const animal =
        animals[Math.floor(Math.random() * animals.length)];

    const popup = document.createElement("div");
    popup.classList.add("animal-popup");

    popup.innerHTML = `
        <div class="animal-emoji">${animal.emoji}</div>
        <div class="animal-name">${animal.name}</div>
    `;

    document.body.appendChild(popup);

    setTimeout(() => {
        popup.remove();
    }, 3000);
}

function createBalloon() {
    const balloon = document.createElement("div");
    balloon.classList.add("balloon");

    const color =
        colors[Math.floor(Math.random() * colors.length)];
    balloon.style.background = color;

    balloon.style.left =
        Math.random() * (window.innerWidth - 100) + "px";

    const speed = Math.random() * 2 + 2.5;

    document.body.appendChild(balloon);

    let position = -180;

    const move = setInterval(() => {
        position += speed;
        balloon.style.bottom = position + "px";

        if (position > window.innerHeight) {
            clearInterval(move);
            balloon.remove();
        }
    }, 20);

    balloon.addEventListener("click", () => {
        clearInterval(move);

        balloon.style.transform = "scale(1.5)";
        balloon.style.opacity = "0";

        setTimeout(() => {
            balloon.remove();
        }, 200);

        score++;
        totalPopped++;

        document.getElementById("score").innerText =
            "Pontos: " + score;

        /* a cada 5 balões -> animal educativo */
        if (totalPopped % 5 === 0) {
            showAnimal();
        }
    });
}

setInterval(() => {
    createBalloon();
}, 800);
</script>

</body>
</html>
